<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, max-width=640px, initial-scale=1">
<title>Feed Collector Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #15202b; color: #e7e9ea; max-width: 640px; margin: 0 auto; }
  header { position: sticky; top: 0; background: rgba(21,32,43,0.85); backdrop-filter: blur(12px); padding: 16px 20px; border-bottom: 1px solid #38444d; z-index: 10; }
  header h1 { font-size: 20px; font-weight: 700; }
  header .meta { font-size: 13px; color: #8899a6; margin-top: 4px; }
  .platform-tabs { display: flex; gap: 0; border-bottom: 1px solid #38444d; }
  .platform-tabs button { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: #8899a6; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .platform-tabs button:hover { color: #e7e9ea; background: rgba(255,255,255,0.03); }
  .platform-tabs button.active { color: #1da1f2; border-bottom-color: #1da1f2; }
  .platform-tabs button .badge { background: #38444d; color: #8899a6; padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
  .sort-bar { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid #38444d; flex-wrap: wrap; }
  .sort-bar button { background: none; border: 1px solid #38444d; color: #8899a6; padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .sort-bar button:hover { border-color: #1da1f2; color: #1da1f2; }
  .sort-bar button.active { background: #1da1f2; border-color: #1da1f2; color: #fff; }
  .post { padding: 16px 20px; border-bottom: 1px solid #38444d; transition: background 0.15s; }
  .post:hover { background: rgba(255,255,255,0.03); }
  .post-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .author { font-weight: 700; font-size: 15px; }
  .handle { color: #8899a6; font-size: 14px; margin-left: 6px; }
  .time { color: #8899a6; font-size: 13px; white-space: nowrap; }
  .platform-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-right: 8px; font-weight: 600; }
  .platform-badge.twitter { background: rgba(29,161,242,0.15); color: #1da1f2; }
  .platform-badge.threads { background: rgba(255,255,255,0.1); color: #e7e9ea; }
  .platform-badge.instagram { background: rgba(225,48,108,0.15); color: #e1306c; }
  .platform-badge.youtube { background: rgba(255,0,0,0.15); color: #ff4444; }
  .yt-embed { border-radius: 12px; overflow: hidden; margin-bottom: 10px; position: relative; padding-bottom: 56.25%; height: 0; }
  .yt-embed iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 12px; }
  .yt-meta { font-size: 13px; color: #8899a6; margin-bottom: 8px; }
  .yt-meta span { margin-right: 12px; }
  .short-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,0,0,0.15); color: #ff4444; font-weight: 600; margin-left: 6px; }
  .repost-badge { font-size: 12px; color: #8899a6; margin-bottom: 6px; }
  .post-text { font-size: 15px; line-height: 1.5; margin-bottom: 10px; word-wrap: break-word; }
  .post-text a { color: #1da1f2; text-decoration: none; }
  .post-text a:hover { text-decoration: underline; }
  .media { border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .media img { width: 100%; display: block; cursor: pointer; transition: opacity 0.15s; }
  .media img:hover { opacity: 0.9; }
  .media video { width: 100%; display: block; border-radius: 12px; }
  .carousel { display: flex; gap: 4px; overflow-x: auto; scroll-snap-type: x mandatory; border-radius: 12px; margin-bottom: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; height: 320px; cursor: grab; user-select: none; }
  .carousel::-webkit-scrollbar { display: none; }
  .carousel.dragging { cursor: grabbing; scroll-snap-type: none; }
  .carousel .carousel-item { flex: 0 0 auto; height: 100%; scroll-snap-align: start; border-radius: 12px; overflow: hidden; position: relative; }
  .carousel .carousel-item img { height: 100%; width: auto; display: block; cursor: pointer; pointer-events: auto; }
  .carousel .carousel-item video { height: 100%; width: auto; display: block; }
  .carousel-counter { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 10px; pointer-events: none; }
  .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 8px; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; z-index: 101; }
  .stats { display: flex; gap: 24px; color: #8899a6; font-size: 13px; }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .replies-toggle { margin-top: 8px; background: none; border: none; color: #1da1f2; font-size: 13px; cursor: pointer; padding: 4px 0; }
  .replies-toggle:hover { text-decoration: underline; }
  .replies-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid #38444d; display: none; }
  .replies-section.open { display: block; }
  .reply { padding: 8px 0 8px 16px; border-left: 2px solid #38444d; margin-bottom: 6px; }
  .reply .reply-header { font-size: 13px; margin-bottom: 2px; }
  .reply .reply-header .author { font-size: 13px; }
  .reply .reply-header .handle { font-size: 12px; }
  .reply .reply-text { font-size: 14px; line-height: 1.4; color: #d9d9d9; }
  .reply .reply-stats { font-size: 12px; color: #8899a6; margin-top: 3px; }
  .ad-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,193,7,0.15); color: #ffc107; font-weight: 600; margin-right: 8px; }
  .has-replies-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #1da1f2; margin-left: 4px; vertical-align: middle; }
  .no-data { padding: 60px 20px; text-align: center; color: #8899a6; }
  .no-data h2 { margin-bottom: 12px; color: #e7e9ea; }
  .no-data code { background: #22303c; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>Feed Collector</h1>
  <div class="meta" id="meta"></div>
</header>

<div class="platform-tabs" id="platform-tabs"></div>

<div class="sort-bar" id="sort-bar">
  <button data-sort="time" class="active">Latest</button>
  <button data-sort="likes">Most Liked</button>
  <button data-sort="reposts">Most Reposted</button>
  <button data-sort="replies">Most Replies</button>
</div>

<main id="feed"></main>

<div class="no-data" id="no-data" style="display:none">
  <h2>No data loaded</h2>
  <p>Drag and drop a <code>posts.json</code> or <code>tweets.json</code> file here, or use the file picker below.</p>
  <br>
  <input type="file" id="file-picker" accept=".json">
</div>

<script>
let allPosts = [];
let currentSort = 'time';
let currentPlatform = 'all';

const PLATFORM_LINKS = {
  twitter: { base: 'https://x.com', mention: (h) => `https://x.com/${h}`, hashtag: (h) => `https://x.com/hashtag/${h}` },
  threads: { base: 'https://threads.net', mention: (h) => `https://threads.net/@${h}`, hashtag: (h) => `https://threads.net/search?q=%23${h}` },
  instagram: { base: 'https://instagram.com', mention: (h) => `https://instagram.com/${h}`, hashtag: (h) => `https://instagram.com/explore/tags/${h}` },
  youtube: { base: 'https://youtube.com', mention: (h) => `https://youtube.com/@${h}`, hashtag: (h) => `https://youtube.com/results?search_query=%23${h}` },
};

async function init() {
  // Scan feed_data/ directory for all runs
  try {
    const res = await fetch('feed_data/');
    if (res.ok) {
      const html = await res.text();
      // Match both new format (with platform suffix) and old formats
      const matches = [...html.matchAll(/href="([^"]+?)\/"/g)]
        .map(m => m[1])
        .filter(d => /^\d{4}-\d{2}-\d{2}/.test(d));

      if (matches.length > 0) {
        // Sort by name (timestamp), take latest per platform
        matches.sort();
        const latestByPlatform = {};
        for (const dir of matches) {
          // Extract platform from dir name: YYYY-MM-DD_HHMMSS_twitter -> twitter
          const parts = dir.split('_');
          const platform = parts.length >= 3 ? parts.slice(2).join('_') : 'twitter';
          latestByPlatform[platform] = dir;
        }

        // Load data from all latest runs
        for (const [platform, dir] of Object.entries(latestByPlatform)) {
          // Try posts.json first, then tweets.json
          for (const filename of ['posts.json', 'tweets.json']) {
            try {
              const dataRes = await fetch(`feed_data/${dir}/${filename}`);
              if (dataRes.ok) {
                const data = await dataRes.json();
                const posts = (data.posts || data.tweets || []).map(p => ({
                  ...p,
                  platform: p.platform || platform,
                  // Normalize field names from old format
                  reposts: p.reposts ?? p.retweets ?? 0,
                  is_repost: p.is_repost ?? p.is_retweet ?? false,
                }));
                allPosts.push(...posts);
                break;
              }
            } catch(e) {}
          }
        }

        if (allPosts.length > 0) {
          renderAll();
          return;
        }
      }
    }
  } catch(e) {}

  document.getElementById('no-data').style.display = 'block';
  document.getElementById('sort-bar').style.display = 'none';
}

function renderAll() {
  document.getElementById('no-data').style.display = 'none';
  document.getElementById('sort-bar').style.display = 'flex';
  renderPlatformTabs();
  updateMeta();
  renderPosts();
}

function renderPlatformTabs() {
  const platforms = [...new Set(allPosts.map(p => p.platform))];
  const counts = {};
  for (const p of allPosts) counts[p.platform] = (counts[p.platform] || 0) + 1;

  const tabs = document.getElementById('platform-tabs');
  let html = `<button data-platform="all" class="active">All<span class="badge">${allPosts.length}</span></button>`;
  for (const p of platforms) {
    html += `<button data-platform="${p}">${p.charAt(0).toUpperCase() + p.slice(1)}<span class="badge">${counts[p]}</span></button>`;
  }
  tabs.innerHTML = html;

  // Only show tabs if more than one platform
  tabs.style.display = platforms.length > 1 ? 'flex' : 'none';
}

function getFilteredPosts() {
  if (currentPlatform === 'all') return allPosts;
  return allPosts.filter(p => p.platform === currentPlatform);
}

function updateMeta() {
  const posts = getFilteredPosts();
  const vidCount = posts.reduce((n, t) => n + (t.video_urls || []).length, 0);
  const imgCount = posts.reduce((n, t) => n + (t.media_urls || []).length, 0);
  const platforms = [...new Set(posts.map(p => p.platform))].join(', ');
  document.getElementById('meta').textContent =
    `${posts.length} posts | ${imgCount} images, ${vidCount} videos | ${platforms}`;
}

function formatText(text, platform) {
  const links = PLATFORM_LINKS[platform] || PLATFORM_LINKS.twitter;
  return text
    .replace(/&amp;/g, '&')
    .replace(/(https?:\/\/t\.co\/\S+)/g, '')
    .replace(/(https?:\/\/\S+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/@(\w+)/g, (_, h) => `<a href="${links.mention(h)}" target="_blank" rel="noopener">@${h}</a>`)
    .replace(/#(\w+)/g, (_, h) => `<a href="${links.hashtag(h)}" target="_blank" rel="noopener">#${h}</a>`)
    .trim();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s`;
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function sortPosts(posts, sort) {
  const sorted = [...posts];
  switch(sort) {
    case 'likes': sorted.sort((a,b) => b.likes - a.likes); break;
    case 'reposts': sorted.sort((a,b) => (b.reposts||0) - (a.reposts||0)); break;
    case 'replies': sorted.sort((a,b) => b.replies - a.replies); break;
    default: sorted.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  }
  return sorted;
}

function renderPosts() {
  const posts = getFilteredPosts();
  const sorted = sortPosts(posts, currentSort);
  const feed = document.getElementById('feed');
  const links = PLATFORM_LINKS;

  feed.innerHTML = sorted.map(t => {
    const platform = t.platform || 'twitter';
    const plinks = links[platform] || links.twitter;
    const authorDisplay = t.author_name || t.author_handle || 'Unknown';
    const handleDisplay = t.author_handle ? `<a href="${plinks.mention(t.author_handle)}" target="_blank" rel="noopener">@${t.author_handle}</a>` : '';
    const showPlatformBadge = currentPlatform === 'all' && allPosts.some(p => p.platform !== platform);

    let mediaHtml = '';
    const pd = t.platform_data || {};
    if (platform === 'youtube' && pd.embed_url) {
      mediaHtml = `<div class="yt-embed"><iframe src="${pd.embed_url}" allowfullscreen loading="lazy"></iframe></div>`;
      if (pd.views || pd.duration) {
        mediaHtml += `<div class="yt-meta">${pd.views ? `<span>${pd.views}</span>` : ''}${pd.duration ? `<span>${pd.duration}</span>` : ''}</div>`;
      }
    } else {
      const paths = (t.local_media_paths || []);
      if (paths.length === 1) {
        const fullPath = paths[0].startsWith('feed_data/') ? paths[0] : `feed_data/${paths[0]}`;
        if (paths[0].endsWith('.mp4')) {
          mediaHtml = `<div class="media"><video src="${fullPath}" muted loop preload="metadata" data-autoplay></video></div>`;
        } else {
          mediaHtml = `<div class="media"><img src="${fullPath}" loading="lazy" onclick="openLightbox(this.src)"></div>`;
        }
      } else if (paths.length >= 2) {
        const items = paths.map((p, idx) => {
          const fullPath = p.startsWith('feed_data/') ? p : `feed_data/${p}`;
          if (p.endsWith('.mp4')) {
            return `<div class="carousel-item"><video src="${fullPath}" muted loop preload="metadata" data-autoplay></video><span class="carousel-counter">${idx+1}/${paths.length}</span></div>`;
          } else {
            return `<div class="carousel-item"><img src="${fullPath}" loading="lazy" onclick="openLightbox(this.src)"><span class="carousel-counter">${idx+1}/${paths.length}</span></div>`;
          }
        });
        mediaHtml = `<div class="carousel">${items.join('')}</div>`;
      }
    }

    const repostBadge = t.is_repost
      ? `<div class="repost-badge">repost${t.original_author ? ' by @' + t.original_author : ''}</div>`
      : '';

    const repostLabel = platform === 'twitter' ? 'RT' : 'reposts';
    const adBadge = t.is_ad ? '<span class="ad-badge">Ad</span>' : '';
    const hasCollectedReplies = t.top_replies && t.top_replies.length > 0;

    return `<div class="post" ${t.is_ad ? 'style="opacity:0.7"' : ''}>
      ${repostBadge}
      <div class="post-header">
        <div>
          ${adBadge}
          ${showPlatformBadge ? `<span class="platform-badge ${platform}">${platform}</span>` : ''}
          <span class="author">${authorDisplay}</span><span class="handle">${handleDisplay}</span>${pd.type === 'short' ? '<span class="short-badge">Short</span>' : ''}
        </div>
        <span class="time">${t.url ? `<a href="${t.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${timeAgo(t.created_at)}</a>` : timeAgo(t.created_at)}</span>
      </div>
      <div class="post-text">${formatText(t.text, platform)}</div>
      ${mediaHtml}
      <div class="stats">
        <span>replies ${fmtNum(t.replies)}${hasCollectedReplies ? '<span class="has-replies-dot" title="Replies collected"></span>' : ''}</span>
        <span>${repostLabel} ${fmtNum(t.reposts || 0)}</span>
        <span>likes ${fmtNum(t.likes)}</span>
        ${t.quotes ? `<span>quotes ${fmtNum(t.quotes)}</span>` : ''}
      </div>
      ${hasCollectedReplies ? `
      <button class="replies-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.textContent = this.nextElementSibling.classList.contains('open') ? 'Hide replies' : 'Show ${t.top_replies.length} replies'">Show ${t.top_replies.length} replies</button>
      <div class="replies-section">
        ${t.top_replies.map(r => `
          <div class="reply">
            <div class="reply-header">
              <span class="author">${r.author_name || r.author_handle || 'Unknown'}</span>
              <span class="handle">${r.author_handle ? '<a href="' + plinks.mention(r.author_handle) + '" target="_blank" rel="noopener">@' + r.author_handle + '</a>' : ''}</span>
            </div>
            <div class="reply-text">${formatText(r.text, platform)}</div>
            <div class="reply-stats">${fmtNum(r.likes)} likes</div>
          </div>
        `).join('')}
      </div>` : ''}
    </div>`;
  }).join('');
}

// Sort buttons
document.getElementById('sort-bar').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.sort-bar button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentSort = e.target.dataset.sort;
  renderPosts();
});

// Platform tabs
document.getElementById('platform-tabs').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.platform-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPlatform = btn.dataset.platform;
  updateMeta();
  renderPosts();
});

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) {
    const r = new FileReader();
    r.onload = () => {
      const data = JSON.parse(r.result);
      const posts = (data.posts || data.tweets || []).map(p => ({
        ...p, platform: p.platform || 'twitter',
        reposts: p.reposts ?? p.retweets ?? 0,
        is_repost: p.is_repost ?? p.is_retweet ?? false,
      }));
      allPosts = posts;
      renderAll();
    };
    r.readAsText(file);
  }
});

// File picker
document.addEventListener('change', e => {
  if (e.target.id !== 'file-picker') return;
  const file = e.target.files[0];
  if (file) {
    const r = new FileReader();
    r.onload = () => {
      const data = JSON.parse(r.result);
      const posts = (data.posts || data.tweets || []).map(p => ({
        ...p, platform: p.platform || 'twitter',
        reposts: p.reposts ?? p.retweets ?? 0,
        is_repost: p.is_repost ?? p.is_retweet ?? false,
      }));
      allPosts = posts;
      renderAll();
    };
    r.readAsText(file);
  }
});

// Lightbox
function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<button class="lightbox-close">&times;</button><img src="${src}">`;
  lb.onclick = () => lb.remove();
  document.body.appendChild(lb);
}

// Video autoplay on scroll (muted)
function setupVideoAutoplay() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const video = entry.target;
      if (entry.isIntersecting) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('video[data-autoplay]').forEach(v => observer.observe(v));
}

// Drag-to-scroll for carousels
function setupCarouselDrag() {
  document.querySelectorAll('.carousel').forEach(carousel => {
    let isDown = false, startX, scrollLeft, hasDragged = false;

    carousel.addEventListener('mousedown', e => {
      isDown = true; hasDragged = false;
      carousel.classList.add('dragging');
      startX = e.pageX - carousel.offsetLeft;
      scrollLeft = carousel.scrollLeft;
    });
    carousel.addEventListener('mouseleave', () => { isDown = false; carousel.classList.remove('dragging'); });
    carousel.addEventListener('mouseup', () => { isDown = false; carousel.classList.remove('dragging'); });
    carousel.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - carousel.offsetLeft;
      const walk = (x - startX) * 1.5;
      if (Math.abs(walk) > 5) hasDragged = true;
      carousel.scrollLeft = scrollLeft - walk;
    });
    // Prevent click (lightbox) if we just dragged
    carousel.addEventListener('click', e => {
      if (hasDragged) { e.stopPropagation(); e.preventDefault(); }
    }, true);
  });
}

// Re-setup observers after rendering
const origRenderPosts = renderPosts;
renderPosts = function() {
  origRenderPosts();
  setupVideoAutoplay();
  setupCarouselDrag();
};

init();
</script>
</body>
</html>
